      Exemples d'utilisation des fonctionnalités :
      - Navigation : Utilisez la barre de menu en haut pour changer de page sans rechargement.
      - Bouton : <button>Cliquez-moi</button>
      - Image : <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Paysage bleu" />
      - Vidéo : <video controls><source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"></video>
      - Titre : <h1>Titre principal</h1>, <h2>Sous-titre</h2>, <h3>Titre section</h3>
      - Mise en forme : <p>Texte normal</p>, <hr>, <a href="#">Lien bleu</a>
      - Formulaire :
        <form>
          <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message"></textarea>
          </div>
          <button type="submit">Envoyer</button>
        </form>
      - Désactivation de bouton : <button disabled>Désactivé</button>
      - Responsive : Le site s'adapte à la taille de l'écran.
    -->
